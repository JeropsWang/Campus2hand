server:
  port: 8083

spring:
  application:
    name: order-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            loggerLevel: full
            connectTimeout: 5000
            readTimeout: 5000

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.orderservice.entity

# 日志
logging:
  level:
    com.orderservice: DEBUG
    com.orderservice.mapper: DEBUG