spring:
  config:
    import: optional:nacos:bootstrap.yml
  # 下面是你原来的配置，不动
  application:
    name: product-service

  cloud:
    nacos:
      # 服务注册发现
      discovery:
        server-addr: 192.168.0.3:8848
        enabled: true

      # 配置中心
      config:
        server-addr: 192.168.0.3:8848
        file-extension: yaml
        enabled: true
        refresh-enabled: true